{% extends "armory/base.html" %}

{% block title %}{% if weapontype %}Edit {{ weapontype.name }}{% else %}New Type{% endif %}{% endblock %}

{% block content %}
<h1>{% if weapontype %}Edit "{{ weapontype.name }}"{% else %}New Weapon Type{% endif %}</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
    <a href="{% url 'armory:weapontype_list' %}" class="btn-cancel">Cancel</a>
</form>
{% endblock %}
