{% extends "armory/base.html" %}

{% block title %}Delete {{ weapon.name }}{% endblock %}

{% block content %}
<h1>Delete "{{ weapon.name }}"?</h1>

<p>Are you sure you want to delete this weapon? This cannot be undone.</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn-delete">Delete</button>
    <a href="{% url 'armory:weapon_list' %}" class="btn-cancel">Cancel</a>
</form>
{% endblock %}
