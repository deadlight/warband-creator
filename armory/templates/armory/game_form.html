{% extends "armory/base.html" %}

{% block title %}{% if game %}Edit {{ game.name }}{% else %}New Game{% endif %}{% endblock %}

{% block content %}
<h1>{% if game %}Edit "{{ game.name }}"{% else %}New Game{% endif %}</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
    <a href="{% url 'armory:game_list' %}" class="btn-cancel">Cancel</a>
</form>
{% endblock %}
