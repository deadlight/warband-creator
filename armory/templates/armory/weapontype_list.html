{% extends "armory/base.html" %}

{% block title %}Types{% endblock %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center;">
    <h1>Weapon Types</h1>
    <a href="{% url 'armory:weapontype_create' %}" class="btn-primary">New Type</a>
</div>

{% if weapon_types %}
<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Weapons</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for wt in weapon_types %}
        <tr>
            <td>{{ wt.name }}</td>
            <td>{{ wt.weapons.count }}</td>
            <td class="actions">
                <a href="{% url 'armory:weapontype_update' wt.pk %}">Edit</a>
                <button class="js-delete-confirm btn-delete-link" data-delete-url="{% url 'armory:weapontype_delete' wt.pk %}" data-item-name="{{ wt.name }}">Delete</button>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p>No types yet. <a href="{% url 'armory:weapontype_create' %}">Create one</a>.</p>
{% endif %}
{% endblock %}
