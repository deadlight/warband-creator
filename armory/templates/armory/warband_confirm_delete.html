{% extends "armory/base.html" %}

{% block title %}Delete {{ warband.name }}{% endblock %}

{% block content %}
<h1>Delete "{{ warband.name }}"?</h1>

<p>Are you sure you want to delete this warband and all its members? This cannot be undone.</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn-delete">Delete</button>
    <a href="{% url 'warbands:warband_list' %}" class="btn-cancel">Cancel</a>
</form>
{% endblock %}
