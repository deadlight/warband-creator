{% extends "armory/_delete_base.html" %}

{% block content %}
<div class="page-header">
    <h1>Remove {{ object.display_name }}</h1>
</div>

<div class="card">
    <div class="card-body">
        <p>Are you sure you want to remove "{{ object.display_name }}" from this warband?</p>
        <p style="color: var(--color-text-light);">This action cannot be undone.</p>

        <form method="post">
            {% csrf_token %}
            <div class="actions" style="margin-top: 1.5rem;">
                <button type="submit" class="btn btn-danger">Remove</button>
                <a href="{% url 'warbands:warband_detail' warband.pk %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
