{% extends "armory/_delete_base.html" %}

{% block breadcrumbs %}
<div class="breadcrumbs">
    <div class="breadcrumbs-content">
        <a href="{% url 'armory:faction_list' %}">Factions</a>
        <span class="separator">/</span>
        <span class="current">Delete {{ object.name }}</span>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Delete {{ object.name }}</h1>
</div>

<div class="card">
    <div class="card-body">
        <p>Are you sure you want to delete "{{ object.name }}"?</p>
        <p style="color: var(--color-text-light);">This action cannot be undone.</p>

        <form method="post">
            {% csrf_token %}
            <div class="actions" style="margin-top: 1.5rem;">
                <button type="submit" class="btn btn-danger">Delete</button>
                <a href="{% url 'armory:faction_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
