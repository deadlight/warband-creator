{% extends "armory/base.html" %}

{% block title %}Games{% endblock %}

{% block content %}
<h1>Games</h1>

{% if games %}
<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Weapons</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for game in games %}
        <tr>
            <td><a href="{% url 'armory:game_detail' game.pk %}">{{ game.name }}</a></td>
            <td>{{ game.weapons.count }}</td>
            <td class="actions">
                <a href="{% url 'armory:game_update' game.pk %}">Edit</a>
                <a href="{% url 'armory:game_delete' game.pk %}">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p>No games yet. <a href="{% url 'armory:game_create' %}">Create one</a>.</p>
{% endif %}
{% endblock %}
