<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Armory{% endblock %}</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        nav a { margin-right: 1rem; }
        nav { margin-bottom: 2rem; padding-bottom: 0.5rem; border-bottom: 1px solid #ccc; }
        table { border-collapse: collapse; width: 100%; }
        th, td { padding: 0.5rem; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f5f5f5; }
        .actions a { margin-right: 0.5rem; }
        form p { margin: 0.75rem 0; }
        form label { display: block; font-weight: bold; margin-bottom: 0.25rem; }
        form input, form textarea, form select { width: 100%; padding: 0.4rem; box-sizing: border-box; }
        .helptext { font-size: 0.85rem; color: #666; }
        .errorlist { color: red; list-style: none; padding: 0; }
        button, .btn { padding: 0.5rem 1rem; cursor: pointer; }
        .btn-delete { background: #dc3545; color: white; border: none; }
        .btn-cancel { text-decoration: none; color: #333; margin-left: 0.5rem; }
        .messages { list-style: none; padding: 0; }
        .messages li { padding: 0.5rem; margin-bottom: 0.5rem; }
        .messages .success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'armory:weapon_list' %}">Weapons</a>
        <a href="{% url 'armory:weapon_create' %}">New Weapon</a>
        <a href="{% url 'armory:game_list' %}">Games</a>
        <a href="{% url 'armory:game_create' %}">New Game</a>
        <a href="{% url 'armory:weapontype_list' %}">Types</a>
        <a href="{% url 'armory:weapontype_create' %}">New Type</a>
        <a href="{% url 'armory:specialrule_list' %}">Rules</a>
        <a href="{% url 'armory:specialrule_create' %}">New Rule</a>
        <a href="{% url 'armory:faction_list' %}">Factions</a>
        <a href="{% url 'armory:faction_create' %}">New Faction</a>
        <a href="{% url 'armory:character_list' %}">Characters</a>
        <a href="{% url 'armory:character_create' %}">New Character</a>
    </nav>

    {% block content %}{% endblock %}
</body>
</html>
