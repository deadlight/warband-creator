{% extends "armory/base.html" %}

{% block title %}Assign Weapon to {{ member.character.name }}{% endblock %}

{% block content %}
<h1>Assign Weapon to "{{ member.character.name }}" in "{{ warband.name }}"</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
    <a href="{% url 'warbands:warband_detail' warband.pk %}" class="btn-cancel">Cancel</a>
</form>
{% endblock %}
