{% extends "armory/base.html" %}

{% block title %}Delete {{ character.name }}{% endblock %}

{% block content %}
<h1>Delete "{{ character.name }}"?</h1>

<p>Are you sure you want to delete this character? This cannot be undone.</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn-delete">Delete</button>
    <a href="{% url 'armory:character_list' %}" class="btn-cancel">Cancel</a>
</form>
{% endblock %}
