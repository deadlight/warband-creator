{% extends "armory/base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 3rem auto;">
    <div class="card">
        <div class="card-header">
            <h1 style="margin: 0; font-size: 1.5rem;">Login</h1>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}

                {% if form.errors %}
                    <div class="messages">
                        <li class="error">Your username and password didn't match. Please try again.</li>
                    </div>
                {% endif %}

                <div class="form-group">
                    <label class="form-label" for="id_username">Username</label>
                    <input type="text" name="username" id="id_username" class="form-input" autofocus required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="id_password">Password</label>
                    <input type="password" name="password" id="id_password" class="form-input" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
