services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wargear
      POSTGRES_USER: wargear
      POSTGRES_PASSWORD: wargear
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wargear"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "
        poetry run python manage.py migrate &&
        poetry run python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - SECRET_KEY=dev-key-change-in-production
      - POSTGRES_DB=wargear
      - POSTGRES_USER=wargear
      - POSTGRES_PASSWORD=wargear
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
